services:
  frontend:
    build:
      context: ..
      dockerfile: docker/dockerfile
      args:
        - API_URL=${API_URL:-http://app:8080/api}
    container_name: pistas-frontend
    ports:
      - "8081:8081"
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pistas-frontend.rule=Host(`pistasvalleperdido.es`) || Host(`www.pistasvalleperdido.es`)"
      - "traefik.http.routers.pistas-frontend.entrypoints=websecure"
      - "traefik.http.routers.pistas-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.pistas-frontend.loadbalancer.server.port=8081"

networks:
  dokploy-network:
    external: true
